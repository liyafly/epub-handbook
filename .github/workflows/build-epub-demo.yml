name: Build EPUB Demo

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - 'templates/epub-style-demo/**'
      - 'scripts/**'
      - 'skills/**'
      - 'docs/final/**'
      - 'docs/guides/**'
      - '.github/workflows/build-epub-demo.yml'
  pull_request:
    paths:
      - 'templates/epub-style-demo/**'
      - 'scripts/**'
      - 'skills/**'
      - 'docs/final/**'
      - 'docs/guides/**'
      - '.github/workflows/build-epub-demo.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean dist
        run: rm -rf templates/epub-style-demo/dist

      - name: Build demo EPUB
        run: sh templates/epub-style-demo/build.sh

      - name: Validate local fixtures and skills
        run: |
          epub=$(ls templates/epub-style-demo/dist/*.epub | head -n 1)
          python3 scripts/validate_skills_basic.py
          python3 scripts/test_epub_ai_harness.py
          python3 scripts/test_validate_text_invariance.py
          python3 scripts/test_epub_cleanup_harnesses.py
          python3 scripts/test_validate_popup_notes.py
          python3 scripts/test_build_demo_epubs.py
          scripts/validate-epub-style-demo.sh --epub "$epub"
          scripts/validate-popup-notes.sh --epub "$epub"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install EPUBCheck
        run: |
          curl -L -o epubcheck.zip https://github.com/w3c/epubcheck/releases/download/v5.1.0/epubcheck-5.1.0.zip
          unzip -q epubcheck.zip -d "$RUNNER_TEMP/epubcheck"
          echo "EPUBCHECK_JAR=$RUNNER_TEMP/epubcheck/epubcheck-5.1.0/epubcheck.jar" >> "$GITHUB_ENV"

      - name: Validate with EPUBCheck
        run: |
          epub=$(ls templates/epub-style-demo/dist/*.epub | head -n 1)
          # 先产出 XML 报告（即使有错误也继续，下一步再判定，保证报告能上传）
          java -jar "$EPUBCHECK_JAR" "$epub" --mode epub --profile default --out "$epub.epubcheck.xml" || true
          report="$epub.epubcheck.xml"
          if [ ! -f "$report" ]; then
            echo "EPUBCheck 没有产出报告 $report" >&2
            exit 1
          fi
          if grep -Eq 'severity="(ERROR|FATAL)"' "$report"; then
            echo "EPUBCheck 报告含 ERROR/FATAL：" >&2
            grep -E 'severity="(ERROR|FATAL)"' "$report" >&2
            exit 1
          fi
          echo "EPUBCheck: 无 ERROR/FATAL"

      - name: Upload EPUB artifact
        uses: actions/upload-artifact@v4
        with:
          name: epub-style-demo-${{ github.sha }}
          path: templates/epub-style-demo/dist/*.epub
          if-no-files-found: error
          retention-days: 30

      - name: Upload EPUBCheck report
        uses: actions/upload-artifact@v4
        with:
          name: epubcheck-report-${{ github.sha }}
          path: templates/epub-style-demo/dist/*.epub.epubcheck.xml
          if-no-files-found: error
          retention-days: 30
