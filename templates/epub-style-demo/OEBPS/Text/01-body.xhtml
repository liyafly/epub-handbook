  <section epub:type="chapter">
    <h1>一、中文正文</h1>
    <p>这是一段普通中文正文，用来检查缩进、行高、两端对齐和字号变化。阅读器调整字体大小后，段落应保持可读，不应出现异常挤压或断行。</p>
    <p>这里包含<em>着重号</em>、<strong>加粗文本</strong>、<cite>作品名</cite>和<q>行内引用</q>，用于观察语义标签的默认样式和自定义样式是否稳定。</p>
    <blockquote>
      <p>块引用用于长引文。它应与正文形成清楚区分，同时不依赖固定宽度和绝对定位。</p>
    </blockquote>
    <figure>
      <img src="../Images/poster.svg" alt="抽象海报图形"/>
      <figcaption>图像样本：验证 `max-width: 100%` 与说明文字。</figcaption>
    </figure>
  </section>
