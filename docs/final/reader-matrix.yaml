  - reader: readest
    case: 18-english-fiction
    status: warn
    reader_version: local-app-2026-05-23
    artifact: templates/epub-style-demo/dist/epub-style-demo-20260523-115701.epub
    failed_page: 18-english-fiction
    issue: "Readest 已能打开新构建包并从目录跳转到英文小说页；标题、::first-letter 首字、正文缩进、居中插图和 caption 默认字号显示正常，待更多字号复测。"
    action: "先按 Stuart Little 类简单英文 EPUB 的结构提炼为合成样文，不复制原书内容；Readest 辅助树暴露旧式 span 首字会拆词，已改为 ::first-letter。"
    workaround: "英文小说优先使用 lang=\"en\"、短 serif 链、左对齐或谨慎 justification、居中 figure；不要依赖固定页高或浮动首字。"
  - reader: kindle_previewer
    case: 18-english-fiction
    status: warn
    reader_version: local-app-2026-05-23
    artifact: templates/epub-style-demo/dist/epub-style-demo-20260523-115701.epub
    failed_page: 18-english-fiction
    issue: "Kindle Previewer 可完成转换并显示英文小说页；标题、首段、::first-letter 首字和正文默认字号可见，待大字号与多设备模式复测。"
    action: "保持 EPUB 3 + NCX 路径，图片使用 PNG，首字采用 ::first-letter 而非拆词 span 或 float，降低 KFX 转换和朗读风险。"
    workaround: "若 Kindle 大字号下段落过密，优先调 line-height 与段落缩进；不要用固定页面尺寸。"
  - reader: ibooks_macos
    case: 18-english-fiction
    status: warn
    reader_version: local-app-2026-05-23
    artifact: templates/epub-style-demo/dist/epub-style-demo-20260523-115701.epub
    failed_page: 18-english-fiction
    issue: "Apple Books 可导入并从目录跳转到英文小说页；标题、::first-letter 首字、正文、插图与 caption 默认字号显示正常，待原版字体/大字号复测。"
    action: "已在 Books.app 做默认字号打开检查；后续需记录原版字体/用户字体设置对排版的影响。"
    workaround: "保留 OPF ibooks:specified-fonts=true，并在页面级使用短英文 serif 链。"
  - reader: readest
    case: 19-border-shadow-notes
    status: warn
    reader_version: local-app-2026-05-23
    artifact: templates/epub-style-demo/dist/epub-style-demo-20260523-220800.epub
    failed_page: 19-border-shadow-notes
    issue: "Readest 可打开最终构建包并从目录跳转到边框与阴影便签；默认字号下 solid/rounded/dashed/double/left-rule、box-shadow、inset、增强斜角感、内联 SVG 专业花边框、长条投影和不规则边缘可见，待大字号复测。"
    action: "通用 demo 已移除 transform rotate，斜角感改用加重左侧色带、顶部边线、偏移投影和不对称圆角；专业花边框改为贝塞尔曲线 SVG 线稿并保留真实文本。"
    workaround: "生产主路径优先使用 border/background/left-rule；box-shadow、outline-offset 只作为可丢失增强。"
  - reader: kindle_previewer
    case: 19-border-shadow-notes
    status: warn
    reader_version: "3.104.0"
    artifact: templates/epub-style-demo/dist/epub-style-demo-20260523-220800.epub
    failed_page: 19-border-shadow-notes
    issue: "Kindle Previewer CLI 转换成功，Enhanced Typesetting 支持，0 errors；新增增强斜角感、内联 SVG 专业花边框和长条投影未破坏 KFX 转换，待 GUI 大字号多设备复测。"
    action: "临时二分确认 transform: rotate() 会触发 KFX 增强排版内部错误；已从通用 demo、文档和 skill 中移除旋转便签主路径，并新增校验防止回归。"
    workaround: "Kindle 目标书稿中不用 transform 旋转文本框；斜角感用不对称边框、圆角和投影模拟，阴影和外轮廓只能作为可丢失增强。"
  - reader: ibooks_macos
    case: 19-border-shadow-notes
    status: warn
    reader_version: local-app-2026-05-23
    artifact: templates/epub-style-demo/dist/epub-style-demo-20260523-220800.epub
    failed_page: 19-border-shadow-notes
    issue: "Apple Books 可打开最终构建包；默认双页视图显示 double、left-rule、box-shadow、inset、增强斜角感、内联 SVG 专业花边框、长条投影和不规则边缘，待大字号复测。"
    action: "保留真实文本和可重排盒模型，便签视觉不依赖图片或固定页面尺寸。"
    workaround: "Apple Books 可显示投影和不规则边缘，但仍需保留边框/底色主路径，避免主题和字号变化时信息丢失。"
