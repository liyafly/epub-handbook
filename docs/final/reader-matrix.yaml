    artifact: templates/epub-style-demo/dist/epub-style-demo-20260521-230603.epub
    failed_page: 17-image-layout
    issue: "Kindle App 实测 figure 浮动可环绕；需验证长正文阈值、短段反例与大字号回归。"
    action: "本轮改为 figure 主路径，去掉 img 直挂对照；figure 使用 25%–35% 百分比宽度区间，demo 默认 30%，正文样例加长以满足环绕阈值。"
    workaround: "环绕失败时先检查正文长度、剩余列宽和字号；短段不能作为失败证据。"
  - reader: readest
    case: 17-image-layout
    status: warn
    reader_version: pending-user-version
    artifact: templates/epub-style-demo/dist/epub-style-demo-20260521-230603.epub
    failed_page: 17-image-layout
    issue: "img 直挂路径在部分阅读器图片偏小；figure 百分比宽度路径需复测。"
    action: "本轮统一改为 figure + 25%–35% 百分比宽度，demo 默认 30%；待 Readest 复测确认尺寸与环绕。"
    workaround: "避免 direct img 作为主路径；带 caption 和环绕图统一使用 figure。"
