expectations:
  # status: pass | warn | fail | na
  - reader: kindle_previewer
    case: 00-cover-metadata
    status: warn
    reader_version: unknown
    artifact: templates/epub-style-demo/dist/epub-style-demo-20260520-233054.epub
    failed_page: package.opf
    issue: "Kindle Previewer W14016: 没有指定封面"
    action: "已在 demo OPF 中补充 PNG cover-image 与 meta name=cover；待重新导入 Kindle Previewer 复测。"
    workaround: "使用 raster 封面图，并同时声明 properties=\"cover-image\" 与 meta name=\"cover\"。"
  - reader: kindle_previewer
    case: 09-kindle-risk
    status: warn
    reader_version: unknown
    artifact: templates/epub-style-demo/dist/epub-style-demo-20260520-235448.epub
    conversion_log: templates/epub-style-demo/dist/epub-style-demo-20260520-233702-conversionLog.csv
    failed_page: unknown
    issue: "conversionLog 只有表头、没有错误行；用户端反馈转换后文档仍打不开。"
    action: "已新增 toc.ncx、spine toc、Kindle 风险页和场景矩阵；完整 demo 已改为 PNG 资源路径，待用新构建产物复测。"
    workaround: "若新包仍打不开，先用 templates/kindle-minimal-repro/dist/kindle-minimal-repro-20260520-235314.epub 对照；minimal 可打开而完整 demo 不可打开时，继续二分页面级 CSS / Ruby / footnote / A-lite 特性。"

  - reader: kindle_previewer
    case: 17-image-layout
    status: warn
    reader_version: pending-kindle-app-version
    artifact: templates/epub-style-demo/dist/epub-style-demo-20260521-214108.epub
    failed_page: 17-image-layout
    issue: "Kindle App 实测 figure 浮动可环绕；需验证长正文阈值、短段反例与大字号回归。"
    action: "本轮改为 figure 主路径，去掉 img 直挂对照；figure 使用固定 CSS 宽度，正文样例加长以满足环绕阈值。"
    workaround: "环绕失败时先检查正文长度、剩余列宽和字号；短段不能作为失败证据。"
  - reader: readest
    case: 17-image-layout
    status: warn
    reader_version: pending-user-version
    artifact: templates/epub-style-demo/dist/epub-style-demo-20260521-214108.epub
    failed_page: 17-image-layout
    issue: "img 直挂路径在部分阅读器图片偏小；figure 固定宽度路径需复测。"
    action: "本轮统一改为 figure + CSS 固定宽度；待 Readest 复测确认尺寸与环绕。"
    workaround: "避免 direct img 作为主路径；带 caption 和环绕图统一使用 figure。"
  - reader: kindle_previewer
    case: 16-math
    status: warn
    reader_version: pending-kindle-app-version
    artifact: templates/epub-style-demo/dist/epub-style-demo-20260521-214108.epub
    failed_page: 16-math
    issue: "KDP Enhanced Typesetting 支持 MathML；本页覆盖分式、根式、上下标、矩阵、semantics/annotation 等标签组合。"
    action: "已在 OPF manifest 为 16-math 声明 properties=\"mathml\"；等待 Kindle App/Previewer 复测渲染。"
    workaround: "若目标平台不支持 MathML，需要提供文本公式或图片公式 fallback。"
  - reader: duokan
    case: 05-duokan-fallback
    status: pass
    reader_version: pending-user-version
    artifact: templates/epub-style-demo/dist/epub-style-demo-20260521.epub
    issue: "验证 ol.duokan-footnote-content 容器级挂载是否可识别。"
    action: "按用户实测保留容器级写法，不再使用 li 级 duokan-footnote-content。"
  - reader: duokan
    case: 06-multi-duokan-fallback
    status: pass
    reader_version: pending-user-version
    artifact: templates/epub-style-demo/dist/epub-style-demo-20260521.epub
    issue: "多条注释场景下验证容器级 duokan-footnote-content。"
    action: "用户实测通过，保留 ol 容器级写法。"
  - reader: kindle_previewer
    case: 10-text-effects
    status: warn
    reader_version: pending-user-version
    artifact: templates/epub-style-demo/dist/epub-style-demo-20260521-214108.epub
    issue: ".dropcap (float:left) 在 Kindle App/Previewer 生效；.wavy 拆行后 Kindle App 显示为普通下划线。"
    action: "保留拆行写法：Kindle 走 underline fallback，Apple Books/Readest/Thorium 等支持 text-decoration-style 的阅读器显示 wavy。"
